<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Splash</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .fade-in {
      opacity: 0;
      transform: scale(0.95);
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body class="bg-black">

  <!-- SPLASH -->
  <div id="splash" class="fixed inset-0 flex items-center justify-center bg-black overflow-hidden">

    <!-- TEXT -->
    <h1 class="text-4xl md:text-5xl font-bold tracking-[0.35em] fade-in text-yellow-400 z-10">
      Prime Deals
    </h1>

    <!-- GOLD CIRCLE -->
    <div id="circle"
      class="absolute w-0 h-0 rounded-full transition-all ease-in-out"
      style="background: radial-gradient(circle, #f5d27a, #d4a94f, #8c6a2b); transition-duration: 900ms;">
    </div>

  </div>

  <!-- FINAL SCREEN -->
  <div id="finalScreen"
    class="hidden fixed inset-0 flex items-center justify-center bg-black">

    <!-- BACKGROUND LOGO -->
    <img src="ChatGPT Image Mar 21, 2026, 09_11_14 PM.png"
      class="absolute w-72 " />
    

  </div>

  <script>
    window.onload = () => {
      const circle = document.getElementById("circle");
      const splash = document.getElementById("splash");
      const final = document.getElementById("finalScreen");

      // Start animation
      setTimeout(() => {
        circle.style.width = "200vw";
        circle.style.height = "200vw";
      }, 600);

      // Show final screen
      setTimeout(() => {
        splash.classList.add("hidden");
        final.classList.remove("hidden");
      }, 1400);

      // Auto redirect (IMPORTANT)
      setTimeout(() => {
        window.location.href = "index1.html"; // 👉 change page here
      }, 3000);
    };
  </script>

</body>
</html>
